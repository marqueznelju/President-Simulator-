<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PH President: Eternal Term</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-red: #ff453a;
            --ios-green: #32d74b;
            --ios-yellow: #ffd60a;
            --ios-text: #ffffff;
            --ios-secondary: #8e8e93;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 50px 20px 15px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--ios-green);
            box-shadow: 0 0 10px var(--ios-green);
            margin-bottom: 8px;
            transition: 0.5s;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 20px;
        }

        .card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }

        .val { font-size: 26px; font-weight: 700; display: block; letter-spacing: -1px; }
        .lbl { font-size: 11px; color: var(--ios-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; display: block; }

        #chart-zone { height: 180px; margin: 0 15px; padding: 10px; background: var(--ios-card); border-radius: 20px; }

        #game-play { padding: 20px; flex-grow: 1; }

        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .badge-bill { background: var(--ios-yellow); color: #000; }
        .badge-event { background: var(--ios-blue); color: #fff; }

        .story { font-size: 19px; line-height: 1.4; font-weight: 500; margin-bottom: 25px; color: #fff; }

        .options-stack { display: flex; flex-direction: column; gap: 12px; }

        .opt-btn {
            background: var(--ios-card);
            color: var(--ios-blue);
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            text-align: left;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .opt-btn:active { background: #3a3a3c; transform: scale(0.97); }
        .opt-btn.veto { color: var(--ios-red); }
        .opt-btn.sign { color: var(--ios-green); }

        #death-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .danger { color: var(--ios-red) !important; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div>
            <div class="lbl">Governance Stability</div>
            <h1 id="header-title" style="margin:0; font-size: 32px;">Year 1</h1>
        </div>
        <div id="status-indicator" class="status-dot"></div>
    </header>

    <div class="stat-row">
        <div class="card">
            <span class="lbl">Public Trust</span>
            <span id="stat-a" class="val">60%</span>
        </div>
        <div class="card">
            <span class="lbl">GDP Growth</span>
            <span id="stat-g" class="val">5.0%</span>
        </div>
    </div>

    <div id="chart-zone"><canvas id="lineChart"></canvas></div>

    <div id="game-play">
        <div id="badge" class="type-badge"></div>
        <div id="story-text" class="story"></div>
        <div id="btn-stack" class="options-stack"></div>
    </div>
</div>

<div id="death-screen">
    <h1 id="death-title" class="danger">OUSTED</h1>
    <p id="death-msg" style="font-size: 18px; color: var(--ios-secondary); margin-bottom: 40px;"></p>
    <button class="opt-btn" onclick="location.reload()" style="justify-content: center; width: 100%;">Return to Malacañang</button>
</div>

<script>
    let turn = 1;
    let stats = { a: 60, g: 5.0 };
    let logs = { labels: ['Y1'], a: [60], g: [5.0] };

    const baseScenarios = [
        {
            type: "bill",
            t: "HOUSE BILL NO. 402: The 'Digital Wealth Tax'. This bill proposes a 5% tax on all cryptocurrency gains and offshore digital assets to fund the national debt.",
            o: [
                { n: "SIGN BILL INTO LAW", a: 15, g: -3, class: 'sign' },
                { n: "VETO BILL", a: -10, g: 5, class: 'veto' }
            ]
        },
        {
            type: "event",
            t: "The Manila Bay reclamation projects are causing flash floods in nearby cities. Environmentalists are chain-linking themselves to heavy machinery.",
            o: [
                { n: "Halt all projects immediately", a: 15, g: -5 },
                { n: "Order a 60-day study", a: 5, g: -1 },
                { n: "Force projects to continue", a: -12, g: 8 },
                { n: "Bribe the group leaders", a: -5, g: -2 },
                { n: "Blame the local mayor", a: 2, g: 0 },
                { n: "Relocate the protesters", a: -3, g: -1 }
            ]
        },
        {
            type: "bill",
            t: "SENATE BILL NO. 88: 'The Sovereign Defense Act'. Increases VAT by 2% to fund the immediate purchase of a submarine fleet for the West Philippine Sea.",
            o: [
                { n: "SIGN BILL INTO LAW", a: 5, g: -4, class: 'sign' },
                { n: "VETO BILL", a: -15, g: 2, class: 'veto' }
            ]
        }
    ];

    const ctx = document.getElementById('lineChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: logs.labels,
            datasets: [
                { label: 'Trust', data: logs.a, borderColor: '#0a84ff', tension: 0.4, pointRadius: 0, borderWidth: 3 },
                { label: 'GDP', data: logs.g, borderColor: '#ff453a', tension: 0.4, pointRadius: 0, borderWidth: 3 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: { display: false } }, 
            scales: { x: { display: false }, y: { display: false } } 
        }
    });

    function engine() {
        // Game Over Logic
        if (stats.g <= -5.0) end("<b>Economic Collapse.</b> Hyperinflation has turned the Peso into paper. You've been removed in a peaceful but firm military transition.");
        if (stats.a <= -10.0) end("<b>House Arrest.</b> Your approval plummeted. The Ombudsman has filed plunder charges and you are confined to your provincial estate.");

        // UI Updates
        document.getElementById('header-title').innerText = `Year ${turn}`;
        document.getElementById('stat-a').innerText = stats.a + "%";
        document.getElementById('stat-g').innerText = stats.g.toFixed(1) + "%";

        // Status Dot Logic
        const dot = document.getElementById('status-indicator');
        if (stats.a < 5 || stats.g < 0) {
            dot.style.background = 'var(--ios-red)';
            dot.style.boxShadow = '0 0 10px var(--ios-red)';
        } else if (stats.a < 25 || stats.g < 2) {
            dot.style.background = 'var(--ios-yellow)';
            dot.style.boxShadow = '0 0 10px var(--ios-yellow)';
        } else {
            dot.style.background = 'var(--ios-green)';
            dot.style.boxShadow = '0 0 10px var(--ios-green)';
        }

        const scene = turn <= baseScenarios.length ? baseScenarios[turn-1] : generateRandomScene();
        
        const badge = document.getElementById('badge');
        badge.innerText = scene.type;
        badge.className = `type-badge badge-${scene.type}`;

        document.getElementById('story-text').innerText = scene.t;
        const btnBox = document.getElementById('btn-stack');
        btnBox.innerHTML = '';

        scene.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = `opt-btn ${opt.class || ''}`;
            b.innerHTML = `<span>${opt.n}</span> <span style="font-size:20px">›</span>`;
            b.onclick = () => {
                stats.a += opt.a;
                stats.g += opt.g;
                turn++;
                logs.labels.push('Y'+turn);
                logs.a.push(stats.a);
                logs.g.push(stats.g);
                chart.update();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                engine();
            };
            btnBox.appendChild(b);
        });
    }

    function generateRandomScene() {
        const isBill = Math.random() > 0.5;
        if (isBill) {
            return {
                type: "bill",
                t: "A controversial new Bill has arrived on your desk regarding Labor Unions and worker strikes during national holidays.",
                o: [
                    { n: "SIGN BILL INTO LAW", a: -10, g: 5, class: 'sign' },
                    { n: "VETO BILL", a: 15, g: -2, class: 'veto' }
                ]
            };
        } else {
            return {
                type: "event",
                t: "A sudden viral video shows a high-ranking official taking a bribe in a Pasay casino. The internet is demanding their head.",
                o: [
                    { n: "Fire the official", a: 15, g: 0 },
                    { n: "Defend them", a: -20, g: 0 },
                    { n: "Ignore the video", a: -10, g: -1 },
                    { n: "Ban the video platform", a: -30, g: -5 },
                    { n: "Call for a Senate Probe", a: 5, g: -0.5 },
                    { n: "Resign in shame (Lose Game)", a: -100, g: -100 }
                ]
            };
        }
    }

    function end(msg) {
        document.getElementById('death-screen').style.display = 'flex';
        document.getElementById('death-msg').innerHTML = msg;
    }

    engine();
</script>
</body>
</html>
