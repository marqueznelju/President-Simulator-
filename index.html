<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Democracy PH: Malacañan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; --red: #ef4444; --green: #22c55e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #app { width: 100%; max-width: 550px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px 0; }
        .stat-card { background: var(--card); border: 1px solid #1e293b; border-radius: 10px; padding: 10px 4px; text-align: center; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; color: var(--accent); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 0.5px; }
        #chart-wrap { background: var(--card); border-radius: 12px; padding: 10px; height: 160px; margin-bottom: 12px; border: 1px solid #1e293b; }
        .ops { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .op-btn { font-size: 0.65rem; padding: 10px 2px; border: none; border-radius: 6px; cursor: pointer; color: #fff; font-weight: bold; background: #334155; transition: 0.2s; }
        .op-btn.active { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .scen-card { background: var(--card); padding: 20px; border-radius: 16px; border-top: 4px solid var(--accent); min-height: 280px; }
        .choice-btn { width: 100%; padding: 14px; margin: 6px 0; background: #1e293b; border: 1px solid #334155; color: #cbd5e1; border-radius: 8px; text-align: left; font-size: 0.85rem; cursor: pointer; }
        .choice-btn:hover { border-color: var(--accent); background: #334155; color: #fff; }
        .modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div style="text-align:center; padding: 10px 0;">
        <h3 style="margin:0; letter-spacing: 2px;">MALACAÑAN PALACE</h3>
        <small id="timer" style="color:var(--accent)">MONTH 1 • YEAR 2026</small>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><span class="stat-lbl">GDP Growth</span><span id="g-gdp" class="stat-val">4.0%</span></div>
        <div class="stat-card"><span class="stat-lbl">Approval</span><span id="g-app" class="stat-val">50%</span></div>
        <div class="stat-card"><span class="stat-lbl">Inflation</span><span id="g-inf" class="stat-val">3.5%</span></div>
        <div class="stat-card"><span class="stat-lbl">Nat'l Debt</span><span id="g-deb" class="stat-val">60%</span></div>
        <div class="stat-card"><span class="stat-lbl">Crime Rate</span><span id="g-cri" class="stat-val">Med</span></div>
        <div class="stat-card"><span class="stat-lbl">Grid Health</span><span id="g-pwr" class="stat-val">90%</span></div>
    </div>

    <div id="chart-wrap"><canvas id="lineChart"></canvas></div>

    <div class="ops">
        <button id="btn-ml" class="op-btn" onclick="act('ml')">MARTIAL LAW</button>
        <button id="btn-cf" class="op-btn" onclick="act('cf')">CURFEW</button>
        <button id="btn-wr" class="op-btn" onclick="act('wr')">WAR STATUS</button>
    </div>

    <div id="sc-card" class="scen-card">
        <h4 id="sc-title" style="margin-top:0; color:var(--accent)">...</h4>
        <p id="sc-desc" style="font-size:0.85rem; opacity:0.8; line-height:1.4"></p>
        <div id="sc-opts"></div>
    </div>
</div>

<div id="end" class="modal">
    <h1 id="end-h" style="color:var(--red)">GAME OVER</h1>
    <p id="end-p" style="max-width:300px; line-height:1.5"></p>
    <button onclick="location.reload()" class="choice-btn" style="width:200px; text-align:center">Start New Term</button>
</div>

<script>
    let p = { gdp: 4.0, app: 50, inf: 3.5, deb: 60, cri: 50, pwr: 90, ml: false, cf: false, wr: false };
    let m = 1;

    const subjects = ["Sovereignty in WPS", "Jeepney Modernization", "POGO Operations", "Rice Tariffs", "Mindanao Autonomy", "BPO Automation", "Charter Change", "Nuclear Energy", "Cyber Scams", "Health Workers Migration", "Maharlika Fund", "Mining Bans", "Public Transpo Crisis", "Minimum Wage Hike"];
    
    function genScen() {
        const sub = subjects[Math.floor(Math.random() * subjects.length)];
        return {
            t: `Crisis: ${sub}`,
            d: `The Department reports a critical shift in ${sub}. Your decision will define the administration's legacy.`,
            o: [
                { n: "Socialist: Massive subsidies and state protection.", e: { app: 15, deb: 8, inf: 2, gdp: -1 } },
                { n: "Authoritarian: Strict regulation and police enforcement.", e: { cri: -20, app: -12, gdp: 0.5, deb: 2 } },
                { n: "Capitalist: Full privatization and foreign ownership.", e: { gdp: 3, deb: -5, app: -10, pwr: 10 } },
                { n: "Balanced: Moderate reform and public consultation.", e: { app: 5, gdp: 0.8, deb: 1, inf: -0.5 } }
            ]
        };
    }

    const ctx = document.getElementById('lineChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: ['M1'], datasets: [
            { label: 'GDP', data: [4], borderColor: '#38bdf8', borderWidth: 2, pointRadius: 0 },
            { label: 'Approval', data: [50], borderColor: '#22c55e', borderWidth: 2, pointRadius: 0 }
        ]},
        options: { maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { labels: { color: '#fff', boxWidth: 10, font: { size: 10 } } } } }
    });

    function update() {
        document.getElementById('g-gdp').innerText = p.gdp.toFixed(1) + "%";
        document.getElementById('g-app').innerText = p.app.toFixed(0) + "%";
        document.getElementById('g-inf').innerText = p.inf.toFixed(1) + "%";
        document.getElementById('g-deb').innerText = p.deb.toFixed(0) + "%";
        document.getElementById('g-cri').innerText = p.cri > 70 ? "High" : p.cri < 30 ? "Low" : "Med";
        document.getElementById('g-pwr').innerText = p.pwr.toFixed(0) + "%";
        document.getElementById('timer').innerText = `MONTH ${m} • YEAR ${2026 + Math.floor(m/12)}`;

        if (p.gdp <= -10 || p.app <= 20) {
            document.getElementById('end').style.display = 'flex';
            document.getElementById('end-h').innerText = p.gdp <= -10 ? "ECONOMY COLLAPSED" : "COUP D'ÉTAT";
            document.getElementById('end-p').innerText = p.gdp <= -10 ? "The Peso is worth nothing. Riots break out at the Central Bank. You are taken into custody." : "Massive crowds at EDSA have breached the gates. The military has withdrawn support. You are under house arrest.";
        }

        chart.data.labels.push('M'+m);
        chart.data.datasets[0].data.push(p.gdp);
        chart.data.datasets[1].data.push(p.app);
        chart.update();
    }

    function act(type) {
        p[type] = !p[type];
        document.getElementById('btn-'+type).classList.toggle('active');
        if(type==='ml') { p.app -= 25; p.cri -= 40; p.gdp -= 2; }
        update();
    }

    function render() {
        const s = genScen();
        document.getElementById('sc-title').innerText = s.t;
        document.getElementById('sc-desc').innerText = s.d;
        const box = document.getElementById('sc-opts');
        box.innerHTML = '';
        s.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'choice-btn';
            b.innerText = opt.n;
            b.onclick = () => {
                for (let k in opt.e) p[k] += opt.e[k];
                // Passive Drifts
                if(p.ml) { p.app -= 2; p.deb += 1; }
                if(p.wr) { p.deb += 3; p.inf += 1.5; p.gdp -= 1; }
                if(p.inf > 8) p.app -= 3;
                if(p.deb > 100) p.gdp -= 0.5;
                m++;
                update();
                render();
            };
            box.appendChild(b);
        });
    }

    render();
</script>
</body>
</html>
